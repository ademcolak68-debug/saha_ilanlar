<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETmax Gayrimenkul</title>
    <style>
        body { margin: 0; background: #f4f4f4; font-family: 'Segoe UI', sans-serif; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; min-height: 100vh; padding-bottom: 20px; }

        /* Açılış Ekranı */
        #acilisEkrani { position: fixed; inset: 0; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition:opacity .5s; }
        #acilisEkrani img { width:230px; max-width:80%; }
        #acilisEkrani h2 { margin-top:20px; font-size:24px; color:#1b4d3e; }
        #acilisEkrani p { margin-top:12px; color:#666; font-size:15px; }
        .yukleme-kapsul { width: 220px; height: 6px; background: #e5e5e5; border-radius: 20px; overflow: hidden; margin-top: 15px; }
        .yukleme-cubuk { width: 0%; height: 100%; background: #d4af37; animation: yukleAnimasyon 4s linear forwards; }
        @keyframes yukleAnimasyon { 100% { width: 100%; } }

        /* Header & İmza */
        .header-top { padding: 15px; font-weight: normal; font-size: 16px; text-align: center; border-bottom: 1px solid #eee; text-transform: uppercase; line-height: 1.4; }
        .firma-imza { font-size: 14px; font-weight: bold; color: #333; text-align: center; padding: 12px; background: #f9f9f9; border-bottom: 1px solid #eee; }

        /* Slider */
        .detay-slider { position: relative; width: 100%; height: 350px; background: #eee; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; }
        .detay-resim { min-width: 100%; height: 100%; object-fit: cover; scroll-snap-align: start; }
        .resim-sayac { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 13px; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); border: none; color: #fff; padding: 15px 10px; cursor: pointer; display: none; }
        .slider-kapsul{ position:relative;}
        @media (min-width: 768px) { .slider-btn { display: block; } }

        /* Sekmeler */
        .tabs { display: flex; background: #eee; border-radius: 8px; margin: 15px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #e0e0e0; cursor: pointer; font-weight: bold; color: #555; }
        .tab-btn.active { background: #d4af37; color: #fff; }
        .tab-content { padding: 0 15px; display: none; }
        .tab-content.active { display: block; }

        /* Detaylar */
        .ozellik { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .aciklama-item { padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        .aciklama-item::before { content: "✔ "; color: #d4af37; }
        .ilan-konum iframe { width: 100%; height: 240px; border: 0; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="acilisEkrani">
    <img src="logo.png" alt="NETmax Gayrimenkul">
    <h2>NETmax Gayrimenkul</h2>
    <p>İlan yükleniyor...</p>

    <div class="yukleme-kapsul">
        <div class="yukleme-cubuk"></div>
    </div>
</div>

<div id="ilanDetay" class="container"></div>

<script>
    let detayIndex = 0;
    const script = document.createElement('script');
    script.src = "js/ilanlar.js?t=" + new Date().getTime();
    script.onload = () => {
        const id = Number(new URLSearchParams(location.search).get("id"));
        const d = (typeof ilanlarVerisi !== 'undefined' ? ilanlarVerisi : []).find(x => x.id === id);
        if (d) {
            render(d);
            setTimeout(() => document.getElementById("acilisEkrani").style.display = "none", 4000);
        }
    };
    document.head.appendChild(script);

    function render(d) {
        if(d.koor){

    const koordinat = d.koor.split(",");

    const lng = koordinat[0];
    const lat = koordinat[1];
            harita = `
            <div class="ilan-konum">
                <h3>Konum</h3>
                <iframe
                src="https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed"
                loading="lazy">
                </iframe>
            </div>
            `;
        }
        let aciklamaList = d.aciklama ? d.aciklama.split(',').map(item => `<div class="aciklama-item">${item.trim()}</div>`).join('') : "Açıklama girilmemiştir.";
        
        let ozellikler = row("Fiyat", d.fiyat + " " + d.paraBirimi);
        const gosterilecekler = ["İlan Tarihi", "M²", "Ada", "Parsel", "Oda Sayısı", "Bina Yaşı", "Bulunduğu Kat", "Kat Sayısı", "Isıtma", "Eşyalı mı", "Kullanım Durumu", "Site İçerisinde"];
        gosterilecekler.forEach(key => { if(d[key]) ozellikler += row(key, d[key]); });

        
        document.getElementById("ilanDetay").innerHTML = `
    <div class="header-top">${d.baslik || "İLAN DETAYI"}<br>${d.il || ""} / ${d.ilce || ""}</div>

    <div class="slider-kapsul">
        <div class="detay-slider" id="slider">
            ${d.resimler.map(r => `<img src="${r}" class="detay-resim">`).join('')}
            <button class="slider-btn" style="left:0" onclick="move(-1)">❮</button>
            <button class="slider-btn" style="right:0" onclick="move(1)">❯</button>
        </div>

        <div class="resim-sayac" id="sayac">1 / ${d.resimler.length}</div>
    </div>

    <div class="firma-imza">NETmax GAYRİMENKUL</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'bilgi')">İlan Bilgileri</button>
        <button class="tab-btn" onclick="openTab(event, 'aciklama')">Açıklama</button>
        <button class="tab-btn" onclick="openTab(event, 'konum')">Konum</button>
    </div>

    <div id="bilgi" class="tab-content active">${ozellikler}</div>
    <div id="aciklama" class="tab-content">${aciklamaList}</div>
    <div id="konum" class="tab-content ilan-konum">${harita}</div>
`;

sliderHazirla();


function row(label, val) {
    return `<div class="ozellik"><span>${label}</span><b>${val}</b></div>`;
}


function openTab(evt, id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    document.getElementById(id).classList.add('active');
    evt.currentTarget.classList.add('active');
}
        
function sliderHazirla(){

    const slider = document.getElementById("slider");
    const sayac = document.getElementById("sayac");
    const resimler = document.querySelectorAll(".detay-resim");

    if(!slider || !sayac) return;


    slider.addEventListener("scroll", function(){

        detayIndex = Math.round(slider.scrollLeft / slider.clientWidth);

        sayac.innerHTML = (detayIndex + 1) + " / " + resimler.length;

    });

}


function move(dir){

    const slider = document.getElementById("slider");
    const resimler = document.querySelectorAll(".detay-resim");

    detayIndex += dir;

    if(detayIndex < 0)
        detayIndex = resimler.length - 1;

    if(detayIndex >= resimler.length)
        detayIndex = 0;


    slider.scrollTo({
        left: detayIndex * slider.clientWidth,
        behavior:"smooth"
    });
}
}
</script>
</body>
</html>
