<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NETmax Gayrimenkul</title>

	<meta property="og:title" content="NETmax Gayrimenkul">
	<meta property="og:description" content="Aksaray Satılık ve Kiralık Gayrimenkuller">
	<meta property="og:image" content="https://netmaxgayrimenkul-ctrl.github.io/ilanlar-site/logo.png">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://netmaxgayrimenkul-ctrl.github.io/ilanlar-site/ilan.html">



<style>

body{
    margin:0;
    padding:0; /* Body padding'ini kaldırdık */
    background:#dfe5ec;
    font-family:Tahoma,sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh; /* Ekranı kaplaması için */
}

:root { --primary-color: #d4af37; --dark-color: #1a1a1a; --light-bg: #f8f9fa; --white: #ffffff; --success-green: #27ae60; --brand-dark-green: #1b4d3e; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
html, body { width: 100%; overflow-x: hidden; background-color: var(--light-bg); color: #333; line-height: 1.5; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #2b2f36; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #ffb300, #ff6f00); border-radius: 50px; }
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #ffc107, #ff8f00); }

*{
    scrollbar-width:thin;
    scrollbar-color:#d4af37 #1f2329;
}


/* ANA İLAN KUTUSU */

.ilan-detay-popup{
    width: calc(100% - 20px); /* Ekran genişliğinden 20px (10px her iki taraf) çıkarıyoruz */
    max-width: 1200px; /* Çok geniş ekranlarda çok yayılmaması için üst sınır */
    height: calc(100vh - 20px); /* Ekran yüksekliğinden 20px çıkarıyoruz */
    margin: 10px auto; /* Üst ve alttan 10px boşluk, yatayda ortala */
    box-sizing:border-box;
    background:#2b2b2b;
    color:#fff;
    border-radius:12px;
    padding: 20px; /* İçerik boşluğunu artırdık */
    display: flex;
    flex-direction: column; /* İçeriği dikey sırala */
    overflow-y: auto; /* İçerik taşarsa kaydır */
}


/* YENİ BAŞLIK ALANI (ÜSTTE) */

.detay-baslik-ust {
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(255,255,255,.15);
    margin-bottom: 20px;
}

.detay-baslik{
    font-size:24px; /* Başlık boyutunu büyüttük */
    font-weight:700;
    color:#c8a96a;
    line-height:1.3;
    letter-spacing:.2px;
}

.detay-fiyat-ust {
    font-size: 18px;
    color: #56d364;
    margin-top: 5px;
}


/* İÇERİK DÜZENİ */

.detay-icerik {
    display: flex;
    gap: 20px;
    flex: 1; /* Kalan dikey alanı kapla */
}

.detay-sol {
    flex: 2; /* Resim alanı daha geniş */
    display: flex;
    flex-direction: column;
}

.detay-sag {
    flex: 1; /* Özellikler alanı daha dar */
    display: flex;
    flex-direction: column;
}


/* RESİM ALANI */

.detay-slider{
    position:relative;
    width:100%;
    height: 100%; /* Sol alanın yüksekliğini kapla */
    background:#f2f2f2;
    border-radius:8px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}


.detay-resim{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}



/* SLIDER BUTONLARI */

.slider-sol,
.slider-sag{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:40px; /* Biraz büyüttük */
    height:40px;
    padding:0;
    margin:0;

    display:flex;
    align-items:center;
    justify-content:center;

    border:none;
    border-radius:50%; /* Tam yuvarlak */

    background:rgba(0,0,0,.65); /* Biraz daha belirgin */
    color:#fff;

    font-family:Arial, sans-serif;
    font-size:32px;
    line-height:40px;

    cursor:pointer;
    transition: background 0.3s;
}

.slider-sol:hover,
.slider-sag:hover {
    background:rgba(0,0,0,.8);
}


.slider-sol{
    left:10px;
}


.slider-sag{
    right:10px;
}



/* ÖZELLİKLER VE HARİTA */

.detay-ozellikler{
    padding:0;
    overflow-y: auto; /* Özellikler çoksa kendi içinde kaydır */
}


.ozellik{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0; /* Boşluğu artırdık */
    font-size:14px; /* Boyutu artırdık */
    border-bottom:1px solid rgba(255,255,255,.12);
}


.ozellik span{
    color:#cfcfcf;
}


.ozellik b{
    color:#56d364;
    font-weight:400;
    text-align:right;
}



/* RESİM YOK */

.resim-yok{
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#eee;
    color:#777;
    border-radius:8px;
}



/* HARİTA */

.ilan-konum{
    margin-top: auto; /* En alta yasla */
    padding-top: 20px;
}


.ilan-konum h3{
    font-size:16px;
    color:#d4af37;
    margin-bottom:10px;
}


.ilan-konum iframe{
    width:100%;
    height:200px; /* Yüksekliği biraz azalttık */
    border:0;
    border-radius:10px;
}


/* MOBİL DÜZENLEME */

@media(max-width:768px){

.ilan-detay-popup{
    height: auto; /* Mobilde dikey kaydırma body üzerinden olsun */
    margin: 10px;
    width: calc(100% - 20px);
    padding: 15px;
}

.detay-baslik-ust {
    margin-bottom: 15px;
}

.detay-baslik{
    font-size:18px;
}

.detay-fiyat-ust {
    font-size: 16px;
}

.detay-icerik {
    flex-direction: column; /* Mobilde alt alta */
    gap: 15px;
}

.detay-sol, .detay-sag {
    flex: none;
    width: 100%;
}

.detay-slider{
    height: 260px; /* Mobilde sabit yükseklik daha iyi */
}

.ozellik{
    font-size:12px;
    padding:8px 0;
}


.slider-sol,
.slider-sag{
    width:32px;
    height:32px;
    font-size:24px;
}

.ilan-konum {
    margin-top: 15px;
}

.ilan-konum iframe {
    height: 180px;
}

}


/* AÇILIŞ EKRANI STİLLERİ (Değişmedi) */
#acilisEkrani{
    position:fixed;
    inset:0;
    background:#ffffff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:opacity .5s;
}

#acilisEkrani img{
    width:230px;
    max-width:80%;
}

#acilisEkrani h2{
    margin-top:20px;
    font-size:24px;
    color:#1b4d3e;
}

#acilisEkrani p{
    margin-top:12px;
    color:#666;
    font-size:15px;
}

.yukleme-kapsul{
    width:220px;
    height:6px;
    background:#e5e5e5;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.yukleme-cubuk{
    width:40%;
    height:100%;
    background:linear-gradient(
        90deg,
        #d4af37,
        #27ae60,
        #d4af37
    );
    border-radius:20px;
    animation:yukleAnimasyon 1.3s infinite;
}

@keyframes yukleAnimasyon{

    0%{
        transform:translateX(-120%);
    }

    100%{
        transform:translateX(300%);
    }

}

</style>

</head>


<body>


<div id="acilisEkrani">
    <img src="logo.png" alt="NETmax Gayrimenkul">
    <h2>NETmax Gayrimenkul</h2>
    <p>İlan yükleniyor...</p>

    <div class="yukleme-kapsul">
        <div class="yukleme-cubuk"></div>
    </div>
</div>

<div id="ilanDetay"></div>

<script>


// Değişken tanımları
let ilanlar = [];
let detayResimler = [];
let detayIndex = 0;


// ilanlar.js dosyasını cache kullanmadan yükle
const script = document.createElement('script');

script.src = "js/ilanlar.js?t=" + new Date().getTime();


script.onload = function(){

    yukle();

};


document.head.appendChild(script);



function yukle(){

    // ilanlar.js yüklendiğinde global ilanlarVerisi değişkenini kullan
    if (typeof ilanlarVerisi !== 'undefined') {
        ilanlar = ilanlarVerisi;
    }


    const id = Number(
        new URLSearchParams(location.search).get("id")
    );


    const ilan = ilanlar.find(x => x.id === id);



    if(!ilan){

        const yuklemeYazi = document.querySelector("#acilisEkrani p");
        const yuklemeKapsul = document.querySelector(".yukleme-kapsul");

        if(yuklemeYazi){
            yuklemeYazi.innerHTML = "İlan bulunamadı";
            yuklemeYazi.style.color = "red";
        }
        if(yuklemeKapsul) yuklemeKapsul.style.display = "none";


    return;

}



    ilanGoster(ilan);


    setTimeout(() => {

        const acilis = document.getElementById("acilisEkrani");

        if(acilis){

            acilis.style.opacity = "0";

            setTimeout(() => {

                acilis.style.display = "none";

            },500);

        }

    }, 1500); // Bekleme süresini biraz azalttık

}


function ilanGoster(ilan){


const d = ilan;

// KOORDİNAT AL
let harita = "";

if(d.koor){

    const koordinat = d.koor.split(",");

    const lng = koordinat[0];
    const lat = koordinat[1];


    harita = `

    <div class="ilan-konum">

        <h3>Konum</h3>

        <iframe
        src="https://www.google.com/maps/embed/v1/view?key=API_KEY&center=$${lat},${lng}&zoom=16"
        loading="lazy">
        </iframe>

    </div>

    `;

}


let resimSlider = "";


if(d.resimler && d.resimler.length > 0){


    detayResimler = d.resimler;
    detayIndex = 0;


    resimSlider = `

    <div class="detay-slider">

        <img id="detayResim"
        src="${d.resimler[0]}"
        class="detay-resim">


        ${d.resimler.length > 1 ? `

		<button 
		id="solOk"
		class="slider-sol" 
		style="display:none;"
		onclick="detayOnceki()">
		‹
		</button>

		<button 
		id="sagOk"
		class="slider-sag" 
		onclick="detaySonraki()">
		›
		</button>

		` : ""}


    </div>

    `;


}else{


    resimSlider = `

    <div class="resim-yok">
        Resim yok
    </div>

    `;


}



document.getElementById("ilanDetay").innerHTML = `


<div class="ilan-detay-popup">

    <div class="detay-baslik-ust">
        <div class="detay-baslik">
            <div class="ilan-ad">
                ${d.baslik || ""}
            </div>
            <div>
                ${d.durum === "satilik" ? "Satılık" : "Kiralık"}
                ${d.konutSekli || d.tip || ""}
            </div>
        </div>
        <div class="detay-fiyat-ust">
            ${d.fiyat || ""} ${d.paraBirimi || ""}
        </div>
    </div>

    <div class="detay-icerik">

        <div class="detay-sol">
            ${resimSlider}
        </div>

        <div class="detay-sag">

            <div class="detay-ozellikler">

                ${d["M²"] ? `
                <div class="ozellik">
                <span>M²</span>
                <b>${d["M²"]}</b>
                </div>
                ` : ""}

                ${d["Ada"] || d["Parsel"] ? `
                <div class="ozellik">
                <span>Ada / Parsel</span>
                <b>${d["Ada"] || "-"} / ${d["Parsel"] || "-"}</b>
                </div>
                ` : ""}

                ${d["Oda Sayısı"] ? `
                <div class="ozellik">
                <span>Oda</span>
                <b>${d["Oda Sayısı"]}</b>
                </div>
                ` : ""}

                ${d["Bina Yaşı"] ? `
                <div class="ozellik">
                <span>Bina Yaşı</span>
                <b>${d["Bina Yaşı"]}</b>
                </div>
                ` : ""}

                ${d["Bulunduğu Kat"] ? `
                <div class="ozellik">
                <span>Kat</span>
                <b>${d["Bulunduğu Kat"]}</b>
                </div>
                ` : ""}

                ${d["Kat Sayısı"] ? `
                <div class="ozellik">
                <span>Kat Sayısı</span>
                <b>${d["Kat Sayısı"]}</b>
                </div>
                ` : ""}

                ${d["Isıtma"] ? `
                <div class="ozellik">
                <span>Isıtma</span>
                <b>${d["Isıtma"]}</b>
                </div>
                ` : ""}

                ${d["Eşyalı mı?"] ? `
                <div class="ozellik">
                <span>Eşyalı</span>
                <b>${d["Eşyalı mı?"]}</b>
                </div>
                ` : ""}

                ${d["Kullanım Durumu"] ? `
                <div class="ozellik">
                <span>Kullanım Durumu</span>
                <b>${d["Kullanım Durumu"]}</b>
                </div>
                ` : ""}

                ${d.aciklama ? `
                <div class="ozellik" style="flex-direction: column; align-items: flex-start; gap: 5px;">
                <span>Açıklama</span>
                <b style="text-align: left; color: #eee; font-size: 13px;">${d.aciklama}</b>
                </div>
                ` : ""}

            </div>

            ${harita}

        </div>

    </div>

</div>


`;

}




function detaySonraki(){


detayIndex++;


if(detayIndex >= detayResimler.length)
detayIndex = 0;


document.getElementById("detayResim").src =
detayResimler[detayIndex];

sliderOkGuncelle();

}


function sliderOkGuncelle(){

    const sol = document.getElementById("solOk");
    const sag = document.getElementById("sagOk");

  0  if(!sol || !sag) return;


    if(detayIndex === 0){

        sol.style.display = "none";
        sag.style.display = "flex";

    } 
    else if(detayIndex === detayResimler.length - 1){

        sol.style.display = "flex";
        sag.style.display = "none";

    }
    else{

        sol.style.display = "flex";
        sag.style.display = "flex";

    }

}


function detayOnceki(){


detayIndex--;


if(detayIndex < 0)
detayIndex = detayResimler.length - 1;


document.getElementById("detayResim").src =
detayResimler[detayIndex];

sliderOkGuncelle();

}


// Sayfa yüklendiğinde script.onload tetiklenecek, 
// o yüzden burada yukle(); çağırmaya gerek yok.

</script>


</body>
</html>
