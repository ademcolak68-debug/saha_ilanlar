<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETmax Gayrimenkul</title>
    <style>
        body { margin: 0; background: #f4f4f4; font-family: 'Tahoma', sans-serif; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; min-height: 100vh; padding-bottom: 20px; }

        /* Yükleme Ekranı */
        #acilisEkrani { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
        .yukleme-kapsul { width: 250px; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .yukleme-cubuk { width: 0%; height: 100%; background: #d4af37; animation: yukleAnimasyon 4s linear forwards; }
        @keyframes yukleAnimasyon { 100% { width: 100%; } }

        /* Slider */
        .slider-wrapper { position: relative; width: 100%; height: 350px; overflow: hidden; }
        .slider-inner { display: flex; width: 100%; height: 100%; transition: transform 0.3s; }
        .slide { min-width: 100%; height: 100%; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); border: none; color: #fff; padding: 15px; cursor: pointer; display: none; }
        @media (min-width: 769px) { .nav-btn { display: block; } }

        /* Tab ve İçerik */
        .tabs { display: flex; background: #eee; margin: 15px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #e0e0e0; cursor: pointer; font-family: Tahoma; }
        .tab-btn.active { background: #d4af37; color: #fff; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div id="acilisEkrani">
    <img src="logo.png" style="width:150px">
    <div class="yukleme-kapsul"><div class="yukleme-cubuk"></div></div>
</div>

<div id="app" class="container"></div>

<script>
    let idx = 0;
    // Harita için Google'ın resmi embed formatı:
    function getMap(koor) {
        if(!koor) return "Konum yok.";
        const [lng, lat] = koor.split(",");
        // Harita linki en güvenli formatta:
        return `<iframe width="100%" height="250" frameborder="0" src="https://www.google.com/maps?q=${lat},${lng}&z=15&output=embed"></iframe>`;
    }

    fetch('js/ilanlar.js?t=' + Date.now()).then(() => {
        const id = new URLSearchParams(window.location.search).get("id");
        const d = ilanlarVerisi.find(x => x.id == id);
        
        if(!d) return document.body.innerHTML = "İlan bulunamadı.";

        let ozellikler = `<div class="ozellik"><span>Fiyat</span><b>${d.fiyat} ${d.paraBirimi}</b></div>`;
        const list = ["İlan Tarihi", "M²", "Ada", "Parsel", "Oda Sayısı", "Bina Yaşı", "Bulunduğu Kat", "Isıtma"];
        list.forEach(k => { if(d[k]) ozellikler += `<div class="ozellik"><span>${k}</span><b>${d[k]}</b></div>`; });

        document.getElementById('app').innerHTML = `
            <div class="header-top">${d.baslik}<br>${d.il}/${d.ilce}</div>
            <div class="slider-wrapper">
                <div class="slider-inner" id="slider">${d.resimler.map(r => `<img src="${r}" class="slide">`).join('')}</div>
                <button class="nav-btn" style="left:0" onclick="move(-1)">❮</button>
                <button class="nav-btn" style="right:0" onclick="move(1)">❯</button>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="go(event, 'bilgi')">Bilgi</button>
                <button class="tab-btn" onclick="go(event, 'aciklama')">Açıklama</button>
                <button class="tab-btn" onclick="go(event, 'konum')">Konum</button>
            </div>
            <div id="bilgi" class="tab-content active">${ozellikler}</div>
            <div id="aciklama" class="tab-content">${d.aciklama}</div>
            <div id="konum" class="tab-content">${getMap(d.koor)}</div>
        `;
        setTimeout(() => document.getElementById('acilisEkrani').style.display = 'none', 4000);
    });

    function move(d) {
        const s = document.getElementById('slider');
        idx = Math.max(0, Math.min(s.children.length - 1, idx + d));
        s.style.transform = `translateX(-${idx * 100}%)`;
    }
    function go(e, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.target.classList.add('active');
    }
</script>
</body>
</html>
