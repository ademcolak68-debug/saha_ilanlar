<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Paneli</title>
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	
	
<style>

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 15px;
    padding-bottom: 60px; /* Alttan boşluk bırakır, kaydırmayı kolaylaştırır */
    max-width: 350px;
    margin: auto;
    position: relative; /* Katmanların düzgün hizalanması için */
	background-color: #f4f7f6; /* Açık gri-yeşil tonu, çok huzurlu durur */
    min-height: 100vh;
}

/* Minimalist tek sütun */
.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px; /* Tıklama alanını rahatlatmak için 4'ten 8'e çıkardım */
    position: relative; /* z-index'in çalışması için gerekli */
    z-index: 10;
    background-color: transparent; /* Formun altını kapatmasın */
}

.field { display: flex; flex-direction: column; }

/* Label'ları daha küçük ve şık yapalım */
.field label { 
    font-size: 14px; 
	font-weight: bold;
    color: #28a745; 
    letter-spacing: 0.5px;
    margin-bottom: 1px;
	margin-left: 3px;
	text-shadow: 0px 0px 1px rgba(0,0,0,0.1);
	font-family: 'Titillium Web', sans-serif;
}

/* Input, select ve textarea stilini güncelledik (Yazı rengi eklendi) */
input, select, textarea { 
    padding: 4px 6px; 
    border: 1px solid #ddd; 
    border-radius: 2px; 
    font-size: 13px; 
    color: #000; /* BURAYI #aaa'dan #000'a ÇEVİRDİK (Artık hep siyah görünecek) */
    outline: none;
    background-color: #fff; 
    font-family: 'Titillium Web', sans-serif;
}

/* Tıklandığında renk değişimi */
input:focus, select:focus, textarea:focus { 
    border-color: #28a745; 
    color: #000; 
}

/* Henüz seçim yapılmamış (değeri boş) select kutularını gri yap */
select option[value=""], select:has(option[value=""]:checked) {
    color: #aaa;
}

/* Seçim yapılmış olanları siyah yap */
select:not(:has(option[value=""]:checked)) {
    color: #000;
}

textarea { height: 60px; font-family: inherit; }

button { 
    padding: 8px; 
    margin-top: 10px; 
    cursor: pointer; 
    background: #28a745; 
    color: white; 
    border: none; 
    border-radius: 2px; 
    font-size: 12px; 
    font-weight: bold;
    width: 100%;
	font-family: 'Titillium Web', sans-serif;
}

/* İlan listesi kapsayıcısı */
#ilanListesi {
    list-style: none;
    padding: 0;
    margin-top: 15px;
    
    /* Şık Kaydırıcı İçin Sihirli Satırlar */
    height: 200px;                  /* Tam 300px yükseklik */
    overflow-y: auto;               /* Sadece dikeyde kaydırma çıksın */
    overflow-x: hidden;             /* Yatayda asla taşma yapmasın */
    padding-right: 8px;             /* Kaydırma çubuğu ilanlara yapışmasın */
    
    /* Firefox İçin İnce ve Renkli Kaydırıcı Desteği */
    scrollbar-width: thin;
    scrollbar-color: var(--primary-color, #27ae60) #f1f1f1;
}

/* Chrome, Edge ve Safari İçin Özel Kaydırıcı Tasarımı */
#ilanListesi::-webkit-scrollbar {
    width: 6px;                     /* Çubuğun jilet gibi incecik olması için */
}

/* Kaydırıcının Arka Plan Kanalı (Track) */
#ilanListesi::-webkit-scrollbar-track {
    background: #f1f1f1; 
    border-radius: 10px;            /* Köşeleri oval yapıyoruz */
}
 
/* Kaydırıcının Tutulan Hareketli Parçası (Thumb) */
#ilanListesi::-webkit-scrollbar-thumb {
    background: var(--primary-color, #27ae60); /* enNETmax yeşili */
    border-radius: 10px;            /* Tam yuvarlatılmış şık görünüm */
    transition: background 0.3s ease;
}

/* Fareyle üzerine gelindiğinde rengi biraz koyulaşsın */
#ilanListesi::-webkit-scrollbar-thumb:hover {
    background: #219653;            /* Hafif koyu yeşil */
}

/* Her bir ilan için kart görünümü */
#ilanListesi li {
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 4px;
    background: #f9f9f9;
    display: flex;
    justify-content: space-between; /* İçeriği sola, butonları sağa yaslar */
    align-items: center;
    font-size: 13px;
    font-family: 'Titillium Web', sans-serif;
}

#ilanListesi li span strong {
    text-transform: capitalize; /* Sadece başlığın ilk harflerini büyük yapar */
}

/* Buton grubu için hizalama */
.buton-grubu {
    display: flex;
    gap: 5px; /* Butonlar arası mesafe */
}

/* Küçük şık butonlar */
.btn-kucuk {
    padding: 3px 8px !important;
    font-size: 12px !important;
    margin-top: 0 !important;
    width: auto !important;
    border-radius: 3px;
}

.btn-duzenle { background: #17a2b8; } /* Mavi tonu */
.btn-sil { background: #dc3545; }      /* Kırmızı tonu */


#bildirimAlani {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%); /* Tam merkezleme sihirbazı */
    z-index: 100000;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none; /* Arka plandaki butonlara tıklanmasını engellemez */
}

.bildirim {
    padding: 10px 20px;
    background: #333;
    color: white;
    border-radius: 0px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    font-family: sans-serif;
    font-size: 16px;
    text-align: center;
    transition: all 0.4s ease;
    animation: fadeIn 0.4s forwards;
    pointer-events: auto; /* Bildirimin kendisi tıklanabilir olsun */
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

#loader-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff; /* Arka plan rengi */
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.5s ease;
}

.loader {
  border: 5px solid #f3f3f3;
  border-top: 5px solid #3498db; /* Yükleme çubuğu rengi */
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Loader'ı gizlemek için kullanılacak sınıf */
.fade-out {
  opacity: 0;
  visibility: hidden;
}


.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.3); /* Biraz daha açık bir karartma */
    backdrop-filter: blur(5px); /* Arka planı daha modern bir bulanıklıkla vurgula */
    justify-content: center;
    align-items: center;
    z-index: 10000;
}

.modal-box {
    background: white;
    padding: 10px; /* İç boşluğu küçülttük */
    border-radius: 8px; /* Köşeleri biraz daha yuvarlak yapalım */
    width: 240px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12); /* Daha yumuşak bir gölge */
    animation: zoomIn 0.25s ease-out; /* Daha hızlı ve yumuşak bir açılış */
}

.modal-box p {
    font-size: 12px;
    color: #555;
    margin: 0 0 15px 0;
}

.modal-actions { display: flex; gap: 5px; }

.btn-onay, .btn-iptal {
    flex: 1; /* Butonları eşit genişlikte yan yana dizdik */
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
}

.btn-onay { background: #ff4d4d; color: white; }
.btn-onay:hover { opacity: 0.9; }

.btn-iptal { background: #f0f0f0; color: #333; }
.btn-iptal:hover { background: #e0e0e0; }

@keyframes zoomIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}



.klasor-wrapper{
    display:flex;
    align-items:center;
    gap:8px;
}

.klasor-wrapper input{
    flex:1;
}

#klasorBtn {
    width: 34px;
    height: 34px;
    cursor: pointer;
    margin-top: -2px;

    font-size: 22px;

    display: flex;
    align-items: center;
    justify-content: center;
}

.resim-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 99999;

    justify-content: center;
    align-items: center;
}

.resim-modal-content {
    width: 60%;
    max-width: 420px;   /* DARALTILDI */
    max-height: 85vh;

    overflow-y: auto;
    background: #fff;
    border-radius: 10px;

    padding: 10px;      /* AZALTILDI */
    position: relative;
}

.resim-modal-close {
    position: absolute;
    right: 10px;
    top: 6px;
    font-size: 24px;
    cursor: pointer;
}

/* LİSTE DAHA SIKI */
.resim-kart {
    display: flex;
    align-items: center;
    gap: 8px;

    margin-bottom: 8px;   /* AZALTILDI */
    padding: 6px;         /* AZALTILDI */

    border: 1px solid #eee;
    border-radius: 8px;
}

/* RESİM DAHA KÜÇÜK */
.resim-kart img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 6px;
}

/* BUTON VE YAZI DAHA SIKI */
.resim-kart span {
    font-size: 13px;
    flex: 1;
}

#resimKlasorBaslik {
    font-size: 16px;
    font-weight: 600;
    text-align: center;

    margin: 6px 0 12px 0;
    padding: 6px 10px;

    background: #f5f5f5;
    border-radius: 8px;

    word-break: break-word;

    transition: 0.2s;
}

#resimKlasorBaslik:hover {
    background: #e9e9e9;
}

/* ==========================================================================
   SCROLL TOP BUTONU
   ========================================================================== */
.scroll-top-btn {
    position: fixed;
    right: 30px;
    bottom: 30px;

    z-index: 9999;

    width: 40px;
    height: 40px;

    display: flex;
    justify-content: center;
    align-items: center;

    background: #888;
    color: var(--white);

    border-radius: 0;

    text-decoration: none;
    font-size: 20px;
    font-weight: 900;

    box-shadow: 0 4px 10px rgba(0,0,0,.3);

    opacity: 0;
    visibility: hidden;
    transform: translateY(10px);

    transition:
        opacity .3s ease,
        visibility .3s ease,
        transform .3s ease,
        background-color .3s ease;
}

.scroll-top-btn.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.scroll-top-btn:hover {
    background: var(--primary-color);
    color: var(--dark-color);
    transform: translateY(-5px);
}

@media (max-width: 768px) {

    .scroll-top-btn {
        right: 10px;
        bottom: 30px;

        width: 30px;
        height: 30px;

        font-size: 15px;
    }
}


</style>
</head>
<body>

<script>

let token = "";
const repo = "ademcolak68-debug/saha_ilanlar";
const filePath = "js/ilanlar.js";

async function baslat() {
    try {
        const response = await fetch("https://raw.githubusercontent.com/ademcolak68-debug/saha_ilanlar/main/confic/data.json");
        const json = await response.json();

        token = atob(json.part1 + json.part2).trim();

        console.log("Token yüklendi!");

    } catch (err) {
        console.error("Token yükleme hatası:", err);
    }
}

// 3. Sayfa yüklendiğinde token'ı çekmeyi başlat


let duzenlenenId = null;
let geciciIlanlar = []; // Düzenleme için listeyi hafızada tutuyoruz
let aktifDuzenlenenButon = null;


function veriyiTemizle(rawContent) {
    const decoded = decodeURIComponent(escape(atob(rawContent.replace(/\s/g, ''))));
    const jsonStr = decoded.replace(/(var|const)\s+ilanlarVerisi\s*=\s*/, "").replace(/;\s*$/, "").trim();
    return jsonStr ? JSON.parse(jsonStr) : [];
}

async function fetchGitHub(method, body = null) {

    const options = {
        method: method,
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json",
            "Accept": "application/vnd.github.v3+json"
        },
        body: body ? JSON.stringify(body) : null
    };

    const response = await fetch(
        `https://api.github.com/repos/${repo}/contents/${filePath}`,
        options
    );

    if (!response.ok) {
        throw new Error("GitHub Bağlantı Hatası: " + response.status);
    }

    return await response.json();
}

function getFormData() {
    return {
        id: duzenlenenId || Date.now(),
		baslik: document.getElementById('baslik').value,
        durum: document.getElementById('etiket').value,
        tip: document.getElementById('tip').value,
        konutTipi: document.getElementById('konutTipi').value,
        konutSekli: document.getElementById('konutSekli').value,
        il: document.getElementById('il').value,
        ilce: document.getElementById('ilce').value,
        mahalle: document.getElementById('mahalle').value,
        fiyat: document.getElementById('fiyat').value,
        paraBirimi: document.getElementById('paraBirimi').value,
        aciklama: document.getElementById('aciklama').value,
        koor: document.getElementById('koor').value,
        klasorIsmi: document.getElementById('klasorIsmi').value,
        resimler: [], 
        videoUrl: "", 
        "İlan Tarihi": document.getElementById('ilanTarihi').value,
        "M²": document.getElementById('m2').value,
		"Ada": document.getElementById('ada').value,
        "Parsel": document.getElementById('parsel').value,
        "Oda Sayısı": document.getElementById('oda').value,
        "Bina Yaşı": document.getElementById('binaYasi').value,
        "Bulunduğu Kat": document.getElementById('kat').value,
        "Kat Sayısı": document.getElementById('katSayisi').value,
        "Isıtma": document.getElementById('isitma').value,
        "Eşyalı mı?": document.getElementById('esyalimi').value,
        "Kullanım Durumu": document.getElementById('kullanimDurumu').value,
        "Site İçerisinde?": document.getElementById('siteIci').value
    };
	
}


function formDoldur(id) {
    // 1. Tıklanan butonu bul
    const tiklananBtn = document.querySelector(`button[onclick="formDoldur(${id})"]`);

    // 2. Eğer aynı butona tekrar tıklandıysa (Vazgeçme işlemi)
    if (aktifDuzenlenenButon === tiklananBtn) {
        vazgec();
        return;
    }

    // 3. Başka bir ilana tıklandıysa, önce önceki düzenleme modunu temizle
    if (aktifDuzenlenenButon) {
        vazgec();
    }

    // 4. Yeni düzenleme modunu başlat
    aktifDuzenlenenButon = tiklananBtn;
    aktifDuzenlenenButon.innerText = "VAZGEÇ";
    aktifDuzenlenenButon.style.backgroundColor = "red";
    aktifDuzenlenenButon.style.color = "white";

    const ilan = geciciIlanlar.find(i => i.id == id);
    if (!ilan) return;

if (videoInput.files.length > 0) {

async function guncelleGitHub(ilanlar, sha) {
    const loader = document.getElementById('loader-wrapper');
    if (loader) loader.classList.remove('fade-out');

    try {
        // map içerisindeki verileri temizlemeden, oldukları gibi string'e zorlayarak al
        const formatliIlanlar = ilanlar.map(ilan => {
            let yeniIlan = { ...ilan };

            // Veriyi zorla string'e çeviriyoruz ki JSON.stringify noktayı silmesin
            if (yeniIlan.fiyat !== undefined && yeniIlan.fiyat !== null) {
				yeniIlan.fiyat = String(yeniIlan.fiyat);
			}
            if (yeniIlan["M²"] !== undefined && yeniIlan["M²"] !== null) {
                yeniIlan["M²"] = String(yeniIlan["M²"]);
            }

            return yeniIlan;
        });

        // Veriyi dosyaya yazılacak formata getir
        const content = "const ilanlarVerisi = " + JSON.stringify(formatliIlanlar, null, 4) + ";";
        
        const response = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
            method: "PUT",
            headers: { 
                "Authorization": "token " + token, 
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({ 
                message: "İlan güncellendi (Orijinal format korunarak)", 
                content: btoa(unescape(encodeURIComponent(content))), 
                sha: sha 
            })
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.message || "Güncelleme başarısız.");
        }

        return await response.json();

    } catch (error) {
        console.error("GitHub güncelleme hatası:", error);
        throw error;
    } finally {
        if (loader) loader.classList.add('fade-out');
    }
}

function toBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
    });
}

async function uploadToGitHub(path, base64Content) {
    const url = `https://api.github.com/repos/${repo}/contents/${path}`;
    
    // 1. Önce dosya var mı diye kontrol et (SHA değerini almak için)
    let sha = null;
    try {
        const checkResponse = await fetch(url, {
            headers: { "Authorization": "Bearer " + token }
        });
        if (checkResponse.ok) {
            const data = await checkResponse.json();
            sha = data.sha;
        }
    } catch (e) { console.log("Dosya yeni, SHA aranmıyor."); }

    // 2. PUT isteği (SHA varsa ekle)
    const body = {
        message: sha ? "Dosya güncellendi" : "Yeni dosya eklendi",
        content: base64Content
    };
    if (sha) body.sha = sha;

    const response = await fetch(url, {
        method: "PUT",
        headers: {
            "Authorization": "token " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
    });

    if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.message || "Dosya yükleme başarısız.");
    }
    return await response.json();
}

async function klasoruGoster() {

    const klasor = document.getElementById('klasorIsmi').value.trim();

    // 🔴 KRİTİK KONTROL (EKLENDİ)
    if (!klasor) {
        gosterBildirim("Klasör adı girin");
        return; // ❌ MODAL AÇILMAZ
    }

    const liste = document.getElementById('resimKlasorListe');
    const baslik = document.getElementById('resimKlasorBaslik');

    try {
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/images/${klasor}`, {
            headers: {
                "Authorization": "token " + token
            }
        });

        // 🔴 404 KONTROLÜ (klasör yoksa)
        if (res.status === 404) {
            liste.innerHTML = "<p>📁 Klasörde resim yok</p>";
            baslik.textContent = klasor;
            document.getElementById('resimKlasorModal').style.display = 'flex';
            return;
        }

        const data = await res.json();

        // 🔴 ARRAY KONTROLÜ
        if (!Array.isArray(data)) {
            liste.innerHTML = "<p>Hata oluştu</p>";
            document.getElementById('resimKlasorModal').style.display = 'flex';
            return;
        }

        baslik.textContent = klasor;
        liste.innerHTML = "";

        data.forEach(d => {
		if (d.type !== "file") return;

		const isVideo = d.name.endsWith(".mp4");

		liste.innerHTML += `
			<div class="resim-kart">
				${
					isVideo
					? `<video src="${d.download_url}" controls style="width:60px;height:60px;border-radius:8px;"></video>`
					: `<img src="${d.download_url}">`
				}

				<span>${d.name}</span>

				<button onclick="resimSil('${d.path}', '${d.sha}', '${klasor}')">
					Sil
				</button>
			</div>
		`;
	});

        document.getElementById('resimKlasorModal').style.display = 'flex';

    } catch (e) {
        console.error(e);
        liste.innerHTML = "<p>Bağlantı hatası</p>";
        document.getElementById('resimKlasorModal').style.display = 'flex';
    }
}



async function resimSil(path, sha, klasor) {
    const onay = confirm("Bu dosyayı silmek istiyor musun?");
    if (!onay) return;

    try {
        // 1. GitHub'dan sil
        const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
            method: "DELETE",
            headers: {
                "Authorization": "token " + token,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "Resim/Video silindi",
                sha: sha
            })
        });

        if (!response.ok) throw new Error("Silme başarısız");

        // 2. Veriyi güncelle
        const data = await fetchGitHub("GET");
        let ilanlar = veriyiTemizle(data.content);
        let degisiklikVarMi = false;

        ilanlar = ilanlar.map(ilan => {
            if (ilan.resimler && ilan.resimler.includes(path)) {
                ilan.resimler = ilan.resimler.filter(p => p !== path);
                degisiklikVarMi = true;
            }
            if (ilan.videoUrl === path) {
                ilan.videoUrl = "";
                degisiklikVarMi = true;
            }
            return ilan;
        });

        if (degisiklikVarMi) {
            await guncelleGitHub(ilanlar, data.sha);
        }

        // 3. MESAJI BURADA GÖSTERİYORUZ
        gosterBildirim("Dosya silindi ve güncellendi!", "success");

        // 4. Modal içeriğini yenile
        await klasoruGoster(); 
		await listeleVeSil();
        

    } catch (e) {
        console.error(e);
        gosterBildirim("Silme sırasında hata oluştu!", "error");
    }
}



// Mevcut silIlan fonksiyonunuzu bulun ve şu şekilde revize edin:
async function silIlan(id) {
    const onay = await yeniConfirm("Bu ilanı, resimlerini ve videosunu tamamen silmek istiyor musun?");
    if (!onay) return;

    // 1. İlanı veriden bulalım
    const data = await fetchGitHub("GET");
    let list = veriyiTemizle(data.content);
    const silinecekIlan = list.find(i => i.id === id);
    
    if (!silinecekIlan) {
        gosterBildirim("İlan bulunamadı!", "error");
        return;
    }

    // 2. Klasörü/Dosyaları silme işlemi
    // Hem resimlerin olduğu klasörü hem de varsa video dosyasının olduğu yolu bulup silelim
    // Not: Resimler ve video aynı klasördeyse, klasörü silmek ikisini de siler.
    if (silinecekIlan.resimler && silinecekIlan.resimler.length > 0) {
        const klasorYolu = silinecekIlan.resimler[0].substring(0, silinecekIlan.resimler[0].lastIndexOf('/'));
        await klasoruSil(klasorYolu);
    } else if (silinecekIlan.videoUrl) {
        // Eğer resim yoksa ama video varsa, videonun klasörünü silebiliriz
        const klasorYolu = silinecekIlan.videoUrl.substring(0, silinecekIlan.videoUrl.lastIndexOf('/'));
        await klasoruSil(klasorYolu);
    }

    // 3. İlanı listeden çıkar ve GitHub'a güncelle
    list = list.filter(i => i.id !== id);
    await guncelleGitHub(list, data.sha);
    
	// Ekrandaki listeyi anında yenile
	await listeleVeSil();

    gosterBildirim("İlan ve tüm medya dosyaları başarıyla silindi.");
}

// Klasör içindeki her şeyi silen yardımcı fonksiyon
async function klasoruSil(klasorYolu) {
    try {
        const response = await fetch(`https://api.github.com/repos/${repo}/contents/${klasorYolu}`, {
            headers: { 
                "Authorization": "token " + token,
                "Accept": "application/vnd.github.v3+json" 
            }
        });

        // Eğer klasör bulunamadıysa (404), sessizce işlemi bitir
        if (!response.ok) {
            if (response.status === 404) {
                console.log("Klasör zaten mevcut değil, silme işlemine gerek yok.");
                return;
            }
            throw new Error("Klasör listelenemedi: " + response.statusText);
        }

        const dosyalar = await response.json();

        // Klasördeki her bir dosyayı tek tek sil
        for (const dosya of dosyalar) {
            const deleteRes = await fetch(`https://api.github.com/repos/${repo}/contents/${dosya.path}`, {
                method: "DELETE",
                headers: { 
                    "Authorization": "token " + token, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    message: "Klasör içeriği silindi",
                    sha: dosya.sha
                })
            });
            
            if (!deleteRes.ok) {
                console.error(`Dosya silinemedi: ${dosya.path}`);
            }
        }
    } catch (e) {
        // Konsolda gereksiz kırmızı hata mesajı görmemek için sadece log basıyoruz
        console.log("Klasör temizleme süreci tamamlandı.");
    }
}

function toggleListe() {
    const liste = document.getElementById('ilanListesi');
    
    // Eğer liste kapalıysa aç
    if (liste.style.display === "none" || liste.style.display === "") {
        liste.style.display = "block";
        
        // Liste açıldığı anda kaydırma işlemini yap
        setTimeout(() => {
            const yOffset = -50; // İstediğin 50px boşluk
            const elementPosition = liste.getBoundingClientRect().top + window.pageYOffset;
            const offsetPosition = elementPosition + yOffset;

            window.scrollTo({
                top: offsetPosition,
                behavior: "smooth"
            });
        }, 100); // Küçük bir gecikme listenin çizilmesi için şart
        
    } else {
        // Eğer zaten açıksa kapat
        liste.style.display = "none";
    }
}
