<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saha İlan Ekleme</title>

<!-- Mapbox GL JS -->
	<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
	<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
	<script src="js/ilanlar.js"></script>

<style>
/* ===================================================
   1. GENEL & HARİTA YAPISI
   =================================================== */
html, body { margin: 0; padding: 0; height: 100%; font-family: Tahoma, sans-serif; overflow-x: hidden; overflow-y: auto; }
#map { width: 100%; height: 100vh; position: relative; }

/* ===================================================
   2. HARİTA POPUP (SABİT KALACAK)
   =================================================== */
.mapboxgl-popup-content { background: #2b2b2b !important; border-radius: 10px !important; padding: 0 !important; overflow: hidden; box-shadow: 0 6px 16px rgba(0,0,0,.35) !important; }
.mapboxgl-popup { max-width: 250px !important; }
.ilan-detay-popup { width: 230px; }
.popup-ana-kutu { padding: 6px 10px; color: #fff; font-weight: 500; line-height: 1.35; }
.popup-baslik-text { font-size: 12px; display: block; margin-bottom: 2px; }
.popup-fiyat { color: #fff; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.3); margin-top: 3px; padding-top: 3px; display: block; }
.popup-no { display: block; font-size: 10px; margin-top: 2px; color: #f1c40f; }

/* Renk Paletleri */
.popup-renk-arsa { background: linear-gradient(135deg, #1b4d3e, #113429) !important; }
.popup-renk-tarla { background: linear-gradient(135deg, #706353, #4a4136) !important; }
.popup-renk-daire { background: linear-gradient(135deg, #1e3a8a, #0f172a) !important; }
.popup-renk-villa { background: linear-gradient(135deg, #581c87, #3b0764) !important; }
.popup-renk-dukkan { background: linear-gradient(135deg, #c29b38, #8a6515) !important; }
.popup-renk-ismerkezi { background: linear-gradient(135deg, #0369a1, #0c4a6e) !important; }
.popup-renk-katkarsiligi { background: linear-gradient(135deg, #334155, #1e293b) !important; }

/* ===================================================
   3. SIDEBAR (SENİN GÖNDERDİĞİN ORİJİNAL KOD)
   =================================================== */
#sidebar { position: absolute; top: 10px; left: -240px; width: 170px; background: #2c3138; color: #fff; z-index: 15; padding: 0 0 15px 0; overflow-y: auto; max-height: calc(100vh - 20px); pointer-events: none; opacity: 0; box-shadow: 4px 4px 15px rgba(0,0,0,0.4); border-radius: 8px; transition: left 0.4s ease, opacity 0.4s ease; }
#sidebar.show { left: 8px; opacity: 1; pointer-events: auto; }
#sidebar h3 { margin: 0 0 15px 0; font-size: 13px; width: 100%; background: linear-gradient(135deg, #d4af37, #f3e5ab); color: #1e2327; padding: 10px 35px 10px 15px; box-sizing: border-box; position: relative; font-weight: 700; font-family: Tahoma, sans-serif; letter-spacing: 0.5px; }
#sidebar label { display: flex; align-items: center; justify-content: flex-start; margin-bottom: 6px; padding: 6px 12px; cursor: pointer; font-family: Tahoma, sans-serif; font-size: 12px; font-weight: 500; color: #e2e8f0; border-radius: 4px; border-left: 3px solid transparent; transition: all 0.2s ease; }
#sidebar label:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
#sidebar label input[type="checkbox"] { width: 16px; height: 16px; margin-right: 10px; cursor: pointer; flex-shrink: 0; }
#sidebar label:has(input[type="checkbox"]:checked) { background: rgba(212, 175, 55, 0.15); color: #fff; font-weight: 700; border-left-color: #d4af37; }
#sidebar label span { margin-left: auto; color: #a0aec0; font-size: 11px; font-weight: normal; position: relative; transition: all 0.2s ease; }
#sidebar label:has(input[type="checkbox"]:checked) span { color: #f3e5ab; font-weight: 500; }
#closeBtn { position: absolute; top: 50%; right: 12px; transform: translateY(-50%); font-size: 18px; cursor: pointer; color: #1e2327; user-select: none; transition: color 0.2s ease; }
#closeBtn:hover { color: #c0392b; }
#toggleBtn { position: absolute; top: 10px; left: 10px; z-index: 20; font-size: 20px; background: linear-gradient(135deg, #d4af37, #f3e5ab); color: #1e2327; border-radius: 4px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; padding: 6px 10px; transition: opacity 0.2s ease; }
#toggleBtn:hover { filter: brightness(1.1); }
.filter-btn-wrapper { display: flex; justify-content: center; padding: 0 12px; }
.filter-btn { width: 100%; padding: 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; background: #3a3f45; color: #fff; font-weight: 600; cursor: pointer; font-size: 11px; font-family: Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; gap: 5px; transition: background 0.2s ease; }
.filter-btn:hover { background: #c0392b; border-color: transparent; }
.home-btn { position: absolute; top: 10px; right: 3px; z-index: 20; width: 40px; height: 40px; border: none; border-radius: 50%; font-size: 18px; font-weight: 700; cursor: pointer; color: #111; background: linear-gradient(135deg, #d4af37, #fff1a8); box-shadow: 0 4px 12px rgba(212,175,55,0.45); transition: all 0.2s ease; }
.home-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(212,175,55,0.65); }
.home-btn:active { transform: scale(0.96); }
.mapboxgl-ctrl-top-right { margin-top: 70px !important; }

/* ===================================================
   4. İLAN DETAY MODAL (TİK YAPISI KORUNDU)
   =================================================== */
.ilan-modal { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(6px); display: none; justify-content: center; align-items: center; z-index: 99999; }
.ilan-modal.aktif { display: flex; }
.ilan-modal-icerik { width: 100%; max-width: 420px; max-height: 92vh; background: #fff; border-radius: 20px; overflow-y: auto; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,.35); }
.modal-kapat { position: absolute; right: 12px; top: 12px; width: 38px; height: 38px; border-radius: 50%; border: none; background: rgba(0,0,0,.65); color: white; cursor: pointer; z-index: 20; }
.detay-slider { width: 100%; height: 260px; position: relative; background: #111; border-radius: 20px 20px 0 0; overflow: hidden; }
.detay-resim { width: 100%; height: 100%; object-fit: cover; }
.detay-ust { padding: 18px 18px 10px; }
.detay-baslik { font-size: 20px; font-weight: 700; }
.detay-fiyat { margin-top: 8px; font-size: 18px; font-weight: bold; color: #0369a1; }
.detay-ozellikler { padding: 0 18px; }
.ozellik { display: flex; align-items: center; gap: 10px; padding: 13px 0; border-bottom: 1px solid #eee; }
.ozellik i { width: 22px; color: #16a34a; font-size: 15px; } 
.ozellik span { flex: 1; color: #777; font-size: 14px; }
.ozellik b { color: #222; font-size: 14px; font-weight: 600; text-align: right; }
</style>
</head>

<body>

<!-- HARITA -->
<div id="map"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>Filtrele <span id="closeBtn">✖</span></h3>
<label><input type="checkbox" value="arsa" checked> Arsa <span id="count-arsa"></span></label>
<label><input type="checkbox" value="daire" checked> Daire <span id="count-daire"></span></label>
<label><input type="checkbox" value="tarla" checked> Tarla <span id="count-tarla"></span></label>
<label><input type="checkbox" value="dukkan" checked> Dükkan <span id="count-dukkan"></span></label>
<label><input type="checkbox" value="ismerkezi" checked> İş Merkezi <span id="count-ismerkezi"></span></label>
<label><input type="checkbox" value="villa" checked> Villa <span id="count-villa"></span></label>
<label><input type="checkbox" value="katkarsiligi" checked> Kat Karşılığı <span id="count-katkarsiligi"></span></label>
  
  <div style="height:5px"></div>  

  <!-- WRAPPER EKLENDİ -->
  <div class="filter-btn-wrapper">
    <button id="hideAllBtn" class="filter-btn">
      🚫 Hepsini Kapat
    </button>
  </div>
  
  <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
	<label id="baseMapLabel">
	  <input type="checkbox" id="streetMapCheck">
	  Sokak Haritası <span>Altlık</span>
	</label>

</div>


<!-- TOGGLE BUTONU -->
<div id="toggleBtn">☰</div>

<!-- HOME BUTONU SAĞ ÜSTE -->
<button id="homeBtn" class="home-btn" title="Ana Sayfaya Dön">
  <i class="fa-solid fa-house"></i>
</button>

<button id="hizliIlanBtn" class="hizli-ilan-btn" title="Hızlı İlan Ekle" onclick="window.location.href='admin.html'">
  <i class="fa-solid fa-plus"></i> İlan Ekle / Sil
</button>


<div id="ilanModal" class="ilan-modal">

    <div class="ilan-modal-icerik">

        <button class="modal-kapat" onclick="modalKapat()">✕</button>

        <div id="ilanModalBody"></div>

    </div>

</div>
	

<script>
// =========================
// MAPBOX & MARKER
// =========================

mapboxgl.accessToken = 'pk.eyJ1IjoiZ2VvZ3JhcGh5cHJvZiIsImEiOiJjanYxb2t1ZG8wNGU1NGFsNXVkcnhzNmFpIn0.M3qCJK8FYa06B-Irc6FD-g';

const map = new mapboxgl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {},
    layers: [],
    glyphs: 'https://api.mapbox.com/fonts/v1/mapbox/{fontstack}/{range}.pbf?access_token=' + mapboxgl.accessToken
  },
  center: [34.019852, 38.365887],
  zoom: 12,
  projection: 'globe'
});

map.addControl(
  new mapboxgl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: true,
    showUserHeading: true
  }),
  'top-right'
);

map.on('load', () => {

 // 1. Google UYDU Kaynağı
  map.addSource('google-tiles', {
    type: 'raster',
    tiles: ['https://mt1.google.com/vt/lyrs=s,h,traffic&x={x}&y={y}&z={z}'],
    tileSize: 256,
    maxzoom: 24
  });

  // 2. Google SOKAK HARİTASI Kaynağı (YENİ)
  map.addSource('google-street', {
    type: 'raster',
    tiles: ['https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}'], // lyrs=m standart sokak haritasıdır
    tileSize: 256,
    maxzoom: 24
  });

  // 3. Google UYDU Katmanı (Varsayılan olarak açık)
  map.addLayer({
    id: 'google-tiles-layer',
    type: 'raster',
    source: 'google-tiles',
    minzoom: 0,
    maxzoom: 24,
    layout: { 'visibility': 'visible' }
  });

  // 4. Google SOKAK HARİTASI Katmanı (Varsayılan olarak kapalı/gizli)
  map.addLayer({
    id: 'google-street-layer',
    type: 'raster',
    source: 'google-street',
    minzoom: 0,
    maxzoom: 24,
    layout: { 'visibility': 'none' } // İlk açılışta gizli tutuyoruz
  });

  // 5. KATMAN GEÇİŞ TETİKLEYİCİSİ (Dinamik Listener)
  const streetCheck = document.getElementById('streetMapCheck');
  if (streetCheck) {
    streetCheck.addEventListener('change', (e) => {
      if (e.target.checked) {
        // Tiklendiyse: Uyduyu gizle, Sokak haritasını göster
        map.setLayoutProperty('google-tiles-layer', 'visibility', 'none');
        map.setLayoutProperty('google-street-layer', 'visibility', 'visible');
      } else {
        // Tik kaldırıldıysa: Uyduyu göster, Sokak haritasını gizle (İlk haline dön)
        map.setLayoutProperty('google-tiles-layer', 'visibility', 'visible');
        map.setLayoutProperty('google-street-layer', 'visibility', 'none');
      }
    });
  }

 // Veriyi Mapbox'ın anlayacağı formata dönüştürme ve TÜRKÇE KARAKTER DÜZELTME
 const ilanlar = ilanlarVerisi.map(item => {
    
    // 1. Koordinat Ayrıştırma
    let koordinatDizisi = [34.019852, 38.365887]; 
    if (item.koor) {
      const parts = item.koor.split(',');
      if (parts.length === 2) {
        koordinatDizisi = [parseFloat(parts[0].trim()), parseFloat(parts[1].trim())];
      }
    }

	    let rawTip = (item.tip || "").toLowerCase().trim();
    let altTip = (item.konutSekli || item.konutTipi || "").toLowerCase().trim();
    
    // Filtreleme için teknik anahtar (Bitişik olması şart çünkü sidebar'da böyle)
    let haritaTipi = "";
    if (rawTip.includes("kat") || altTip.includes("kat") || item.durum === "kat-karsiligi") {
        haritaTipi = "katkarsiligi";
    } else if (rawTip === "konut" || rawTip === "isyeri" || rawTip === "işyeri" || rawTip === "") {
        if (altTip.includes("dükkan") || altTip.includes("dukkan")) haritaTipi = "dukkan";
        else if (altTip.includes("iş") || altTip.includes("is") || altTip.includes("merkez")) haritaTipi = "ismerkezi";
        else if (altTip.includes("daire")) haritaTipi = "daire";
        else if (altTip.includes("villa")) haritaTipi = "villa";
        else if (altTip.includes("arsa")) haritaTipi = "arsa";
        else if (altTip.includes("tarla")) haritaTipi = "tarla";
        else haritaTipi = altTip || "daire";
    } else {
        haritaTipi = rawTip;
    }

    // 3. TÜRKÇE KARAKTER UYUMU (Durum)
    let rawDurum = (item.durum || "").toLowerCase().trim();
    let temizDurum = "";
    
    if (rawDurum === "kat-karsiligi") temizDurum = "Kat Karşılığı";
    else if (rawDurum === "satilik" || rawDurum === "satılık") temizDurum = "Satılık";
    else if (rawDurum === "kiralik" || rawDurum === "kiralık") temizDurum = "Kiralık";
    else temizDurum = rawDurum.charAt(0).toUpperCase() + rawDurum.slice(1);

    // 4. LEVHA METNİ OLUŞTURMA (Tam istediğin format)
    let levhaYazisi = "";
    
    // Tip metnini güzelleştiriyoruz (Kat-karsiligi gibi saçma sapan ifadeleri temizliyoruz)
    let tipMetni = (altTip || rawTip).toLowerCase();
    if (tipMetni.includes("kat")) tipMetni = "Arsa"; // Katla ilgili bir şeyse tip kısmına Arsa yazdırıyoruz
    else tipMetni = tipMetni.charAt(0).toUpperCase() + tipMetni.slice(1);
    
    // EĞER KAT KARŞILIĞIYSA:
    if (haritaTipi === "katkarsiligi") {
        // Burada senin istediğin gibi "Kat Karşılığı Arsa" veya sadece "Kat Karşılığı" yazdırabilirsin
        levhaYazisi = `Kat Karşılığı ${tipMetni}`; 
    } else {
        // Normal durum: "Satılık Daire", "Kiralık Dükkan"
        levhaYazisi = `${temizDurum} ${tipMetni}`;
    }

    return {
      coord: koordinatDizisi,
      id: item["İlan No"] || item.id || "---", 
      tip: haritaTipi, // Filtre için bitişik "katkarsiligi"
      levhaText: levhaYazisi, // Harita üzerinde görünecek: "Kat Karşılığı Daire"
      fiyat: (item.fiyat || "") + " " + (item.paraBirimi || ""),
      data: item
    };
});

// ==========================================
  // MARKER VE RENKLİ POPUP'LARIN BASILMASI
  // ==========================================
  const markersByType = {};

  ilanlar.forEach(ilan => {
    const el = document.createElement("div");
    el.style.width = "14px"; 
    el.style.height = "14px";
    el.style.borderRadius = "50%";
    el.style.border = "2px solid #fff";
    el.style.cursor = "pointer";
    el.style.boxShadow = "0 2px 6px rgba(0,0,0,0.6)";

    // Yuvarlak harita noktalarının renk eşleştirmesi
    // Küçük yuvarlak harita noktalarının yeni asil renk eşleştirmesi
    el.style.backgroundColor =
      ilan.tip === "arsa" ? "#1b4d3e" :         // Zümrüt Yeşili
      ilan.tip === "daire" ? "#1e3a8a" :        // Gece Mavisi
      ilan.tip === "tarla" ? "#706353" :         // Vizon / Haki
      ilan.tip === "dukkan" ? "#c29b38" :        // Premium Gold / Kehribar
      ilan.tip === "ismerkezi" ? "#0369a1" :     // Çelik Mavisi
      ilan.tip === "villa" ? "#581c87" :         // Lüks Mürdüm
      ilan.tip === "katkarsiligi" ? "#334155" :  // Kurşun Gri
      "#1f2937";

    // Dinamik renk sınıfını belirliyoruz
    const renkSinifi = 
      ilan.tip === "arsa" ? "popup-renk-arsa" :
      ilan.tip === "tarla" ? "popup-renk-tarla" :
      ilan.tip === "daire" ? "popup-renk-daire" :
      ilan.tip === "villa" ? "popup-renk-villa" :
      ilan.tip === "dukkan" ? "popup-renk-dukkan" :
      ilan.tip === "ismerkezi" ? "popup-renk-ismerkezi" :
      ilan.tip === "katkarsiligi" ? "popup-renk-katkarsiligi" : "popup-renk-varsayilan";

    // Popup yapısına ilgili renk sınıfını enjekte ediyoruz
	const popup = new mapboxgl.Popup({ 
      offset: 14, // Noktaya olan ideal uzaklık
      closeButton: false, 
      closeOnClick: false,
      focusAfterOpen: false 
    })
    .setHTML(`
	  <div class="popup-ana-kutu ${renkSinifi}">

		<span class="popup-baslik-text">
		  ${ilan.levhaText}
		</span>

		<span class="popup-fiyat">
		  ${ilan.fiyat}
		</span>

		<button class="detay-btn" id="detayBtn-${ilan.id}">
		  Detay
		</button>

	  </div>
	`)

    const marker = new mapboxgl.Marker(el)
      .setLngLat(ilan.coord)
      .setPopup(popup)
      .addTo(map);
	  
	  popup.on('open', () => {

  const btn = document.getElementById("detayBtn-" + ilan.id);

  if(btn){

    btn.onclick = () => {

      popup.remove();

      setTimeout(()=>{
        ilanDetayPopup(ilan);
      },100);

    };

  }

});

    marker.togglePopup(); // Levhayı otomatik aç

    if (!markersByType[ilan.tip]) markersByType[ilan.tip] = [];
    markersByType[ilan.tip].push({ marker, popup });

  });
  
  

  // Sidebar sayaçlarını güncelleme
  Object.keys(markersByType).forEach(tip => {
    const el = document.getElementById(`count-${tip}`);
    if (el) {
      el.textContent = `(${markersByType[tip].length})`;
    }
  });

  // Haritayı odakla
  if (ilanlar.length > 0) {
    const bounds = new mapboxgl.LngLatBounds();
    ilanlar.forEach(ilan => bounds.extend(ilan.coord));
    map.fitBounds(bounds, { padding: 60, maxZoom: 14 });
  }

  // CHECKBOX FİLTRELEME KONTROLLERİ
  document.querySelectorAll('#sidebar input[type="checkbox"]').forEach(cb => {
    cb.addEventListener("change", () => {
      const tip = cb.value;
      if (!markersByType[tip]) return;
      markersByType[tip].forEach(o => {
        if (cb.checked) { o.marker.addTo(map); o.popup.addTo(map); }
        else { o.popup.remove(); o.marker.remove(); }
      });
    });
  });
  
  // HEPSİNİ KAPAT BUTONU
  document.getElementById("hideAllBtn").addEventListener("click", () => {
    document.querySelectorAll('#sidebar input[type="checkbox"]').forEach(cb => cb.checked = false);
    Object.values(markersByType).forEach(list => {
      list.forEach(o => {
        o.popup.remove();
        o.marker.remove();
      });
    });
  });

  // ÜSTTEKİ SİLİNMİŞ OLAN KAPAT/X ve HOME EVENTLERİ
  const sidebar = document.getElementById('sidebar');
  const toggleBtn = document.getElementById('toggleBtn');
  const closeBtn = document.getElementById('closeBtn');

  toggleBtn.addEventListener('click', () => {
    sidebar.classList.add('show');
    toggleBtn.style.display = 'none';
  });

  closeBtn.addEventListener('click', () => {
    sidebar.classList.remove('show');
    toggleBtn.style.display = 'flex';
  });
  
  document.getElementById('homeBtn').addEventListener('click', () => {
    if (ilanlar.length > 0) {
      const bounds = new mapboxgl.LngLatBounds();
      ilanlar.forEach(ilan => bounds.extend(ilan.coord));
      map.fitBounds(bounds, { padding: 50 });
    }
  });

});
  
 function ilanDetayPopup(ilan) {

    const d = ilan.data;

    let resimSlider = "";

    if (d.resimler && d.resimler.length > 0) {

        window.detayResimler = d.resimler;
        window.detayIndex = 0;


        resimSlider = `

        <div class="detay-slider">

            <img 
            id="detayResim"
            src="${d.resimler[0]}"
            class="detay-resim">


            ${
            d.resimler.length > 1 ?

            `

            <button class="slider-sol" onclick="detayOnceki()">
                ‹
            </button>

            <button class="slider-sag" onclick="detaySonraki()">
                ›
            </button>

            `

            :
            ""

            }


            <div class="resim-sayac" id="resimSayac">
                1 / ${d.resimler.length}
            </div>


        </div>

        `;


    } else {


        resimSlider = `

        <div class="resim-yok">

            <i class="fa-regular fa-image"></i>

            <br>

            Resim yok

        </div>

        `;


    }



    // Özellik listesi

    const alanlar = [

        ["M²", d["M²"]],

        ["Ada / Parsel",
        (d["Ada"] || d["Parsel"]) ?
        `${d["Ada"] || "-"} / ${d["Parsel"] || "-"}`
        :
        null
        ],


        ["Oda Sayısı", d["Oda Sayısı"]],

        ["Bina Yaşı", d["Bina Yaşı"]],

        ["Bulunduğu Kat", d["Bulunduğu Kat"]],

        ["Kat Sayısı", d["Kat Sayısı"]],

        ["Isıtma", d["Isıtma"]],

        ["Eşyalı", d["Eşyalı mı?"]],

        ["Kullanım Durumu", d["Kullanım Durumu"]]

    ];



    let ozellikHTML = "";



    alanlar.forEach(item=>{


        if(item[1]){


            ozellikHTML += `


            <div class="ozellik">


                <i class="fa-solid fa-circle-check"></i>


                <span>
                    ${item[0]}
                </span>


                <b>
                    ${item[1]}
                </b>


            </div>


            `;


        }


    });




    modalAc(`


    <div class="ilan-detay-popup">


        ${resimSlider}



        <div class="detay-ust">


            <div class="detay-baslik">

                ${ilan.levhaText}

            </div>


            <div class="detay-fiyat">

                ${ilan.fiyat}

            </div>


        </div>





        <div class="detay-ozellikler">


            ${ozellikHTML}



        </div>




        ${
        d.aciklama ?

        `

        <div class="ozellik-aciklama">


            <b>Açıklama</b>


            <br>


            ${d.aciklama}


        </div>

        `

        :
        ""

        }





        <div class="detay-paylas">


            <button onclick="ilanPaylas('${ilan.id}')">


                <i class="fa-brands fa-whatsapp"></i>


                WHATSAPP İLE PAYLAŞ


            </button>


        </div>



    </div>



    `);



}







function detaySonraki(){


    if(!window.detayResimler)
        return;



    window.detayIndex++;



    if(window.detayIndex >= window.detayResimler.length){

        window.detayIndex = 0;

    }



    document.getElementById("detayResim").src =
    window.detayResimler[window.detayIndex];



    const sayac =
    document.getElementById("resimSayac");


    if(sayac){

        sayac.innerHTML =
        `${window.detayIndex + 1} / ${window.detayResimler.length}`;

    }


}








function detayOnceki(){


    if(!window.detayResimler)
        return;



    window.detayIndex--;



    if(window.detayIndex < 0){

        window.detayIndex =
        window.detayResimler.length - 1;

    }



    document.getElementById("detayResim").src =
    window.detayResimler[window.detayIndex];



    const sayac =
    document.getElementById("resimSayac");


    if(sayac){

        sayac.innerHTML =
        `${window.detayIndex + 1} / ${window.detayResimler.length}`;

    }


}







function modalAc(html){


    document.getElementById("ilanModalBody").innerHTML = html;


    document.getElementById("ilanModal")
    .classList.add("aktif");


}






function modalKapat(){


    document.getElementById("ilanModal")
    .classList.remove("aktif");


    document.getElementById("ilanModalBody")
    .innerHTML = "";


}








function ilanPaylas(id){


    const link =

    `${location.origin}${location.pathname.replace("index.html","")}ilan.html?id=${id}`;



    const mesaj =

    `İlanı incelemek için bağlantı:

${link}`;



    window.open(

        `https://wa.me/?text=${encodeURIComponent(mesaj)}`,

        "_blank"

    );


}
	 

</script>
